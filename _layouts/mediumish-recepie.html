<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: page.excerpt | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="shortcut icon" href="{{ site.baseurl }}/favicon.ico">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/plugins/font-awesome/css/all.css">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/recepies-theme.css">
</head>
<body class="mediumish-body">
  <nav class="navbar navbar-expand-lg navbar-light fixed-top" id="mainNav">
    <div class="container">
      <a class="navbar-brand" href="{{ site.baseurl }}/">{{ site.title }}</a>
      <button class="navbar-toggler navbar-toggler-right" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
        Menu
        <i class="fas fa-bars"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarResponsive">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item"><a class="nav-link" href="{{ site.baseurl }}/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ site.baseurl }}/blog/">Blog</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ site.baseurl }}/recepies/">Recepies</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container mediumish-page">
    <article class="recipe-post">
      {% if page.image %}
      <img class="post-cover" src="{{ page.image }}" alt="{{ page.title }}">
      {% endif %}
      <h1>{{ page.title }}</h1>
      {% if page.description %}
      <p class="lead">{{ page.description }}</p>
      {% endif %}
      <div class="post-meta-line">
        {% if page.date %}
        <span>{{ page.date | date: "%B %-d, %Y" }}</span>
        {% endif %}
        {% if page.author %}
        <span>{{ page.author }}</span>
        {% endif %}
      </div>
      <div class="post-content">
        {{ content }}
      </div>
    </article>
  </main>
</body>
</html>
