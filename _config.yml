#Update all the sections by editing the data.yml file inside _data folder.

# Site Settings
title: My Resume
url: 'https://rubel-hossain.github.io'
recepies_page_heading: "Recipes"
recepies_page_subtitle: "A collection of recipes"

#change it according to your repository name
# disabling since we are using a custom domain
#baseurl: '/online-cv' 

description: A beautiful Jekyll theme for creating resume
blog_paginate: 3
recepies_paginate: 3
collections:
  blog:
    output: true
    permalink: /blog/:year/:month/:day/:title/
  recepies:
    output: true
    permalink: /recepies/:title/
defaults:
  - scope:
      path: ""
      type: blog
    values:
      layout: clean-blog-post
  - scope:
      path: ""
      type: recepies
    values:
      layout: mediumish-recepie
# Style will be applied only after restarting the build or serve. Just choose one of the options.
theme_skin: blue # blue turquoise green berry orange ceramic teal oceanstale
chrome_mobile_color: #use hex colors (ex:#1976d2) or leave empty if you don't want a color for chrome mobile searchbar

# Tracker
analytics: UA-83979019-1

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # http://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# Build settings
compress-site: yes

encoding: "utf-8"
compress_html: # - http://jch.penibelst.de/
  clippings: all
  ignore:
    envs: development

# Development Settings
port: 4000
host: 0.0.0.0
safe: false
